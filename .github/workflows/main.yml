# This is a basic workflow to help you get started with Actions

name: "🏷️ CI"

# Controls when the workflow will run
on:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: "📒 Checkout repository..."
        uses: actions/checkout@v6

      - name: "🧭 Installing Dependencies..."
        run: |
           sudo apt-get update -y
           sudo apt-get install -y \
            bc cpio kmod bison clang llvm lld build-essential device-tree-compiler \
            flex libssl-dev libncurses5-dev libncurses-dev \
            python3 python-is-python3 zip ccache jq curl git \
            libelf-dev libc6 libc6-dev rsync wget binutils lz4 zstd \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi g++-aarch64-linux-gnu g++-arm-linux-gnueabi
      
      # Runs a single command using the runners shell
      - name: "🧩 Start building Neutron Clang..."
        run: |
           ./build-llvm.sh --shallow-clone
