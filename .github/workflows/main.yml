# This is a basic workflow to help you get started with Actions

name: "🏷️ CI"

# Controls when the workflow will run
on:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: "🔖 Maximize Build Space"
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false
          
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: "📒 Checkout repository..."
        uses: actions/checkout@v6

      - name: "🧭 Installing Dependencies..."
        run: |
           sudo apt-get update -y
           sudo apt-get install -y \
            bc cpio kmod bison clang llvm lld build-essential libc++-dev libc++abi-dev \
            flex libssl-dev libncurses5-dev libncurses-dev libunwind-dev zlib1g-dev libzstd-dev \
            python3 python-is-python3 zip ccache jq curl git libelf-dev libssl-dev \
            libelf-dev libc6 libc6-dev rsync wget binutils lz4 zstd xz-utils cmake tar \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi g++-aarch64-linux-gnu g++-arm-linux-gnueabi

      - name: "🧪 Setup CCache Engine"
        uses: actions/cache@v5
        with:
          path: /home/runner/.ccache
          key: ccache-llvm-build-${{ github.run_id }}
          restore-keys: |
            ccache-llvm-build-
      
      # Runs a single command using the runners shell
      - name: "🧩 Start building Neutron Clang..."
        run: |
          export CCACHE_DIR=/home/runner/.ccache
          export CCACHE_BASEDIR=$GITHUB_WORKSPACE
          export CCACHE_COMPILERCHECK=content
          ccache -M 10G
          ccache -z
           ./build-llvm.sh --shallow-clone
